<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EMP PARTS - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: #141414;
            min-height: 100vh;
        }

        /* ── COVER ── */
        .cover-area {
            width: 100%;
            height: 130px;
            overflow: hidden;
            background: #1a2a38;
            position: relative;
        }
        .cover-image {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            display: block;
        }
        .cover-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.65));
        }

        /* ── HEADER AREA ── */
        .header-area {
            background: #141414;
            padding: 0 24px 20px;
        }

        /* Avatar pulled up over cover with negative margin */
        .avatar-wrapper {
            width: 90px; height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ff8c42;
            background: #2a2a2a;
            box-shadow: 0 4px 18px rgba(255,140,66,0.38);
            margin-top: -45px;
            margin-bottom: 12px;
            position: relative;
            z-index: 20;
        }
        .avatar-wrapper img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
        }
        .av-ph {
            width: 100%; height: 100%;
            background: #ff8c42;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff;
        }

        .company-badge {
            display: inline-block;
            background: rgba(255,140,66,0.12);
            border: 1px solid rgba(255,140,66,0.35);
            color: #ff8c42;
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 14px; border-radius: 20px;
            margin-bottom: 10px;
        }
        .person-name {
            font-size: clamp(1.7rem, 7vw, 2.2rem);
            font-weight: 900; color: #fff;
            line-height: 1.1; margin-bottom: 6px;
        }
        .person-title {
            font-size: clamp(0.82rem, 3.2vw, 0.95rem);
            color: #ff8c42; font-weight: 700; margin-bottom: 8px;
        }
        .tagline-text {
            font-size: clamp(0.75rem, 2.8vw, 0.84rem);
            color: rgba(255,255,255,0.4);
            line-height: 1.55; margin-bottom: 12px;
        }

        /* Address in header */
        .header-address {
            display: flex; align-items: flex-start; gap: 8px;
            margin-bottom: 12px;
        }
        .header-address i {
            color: #ff8c42; font-size: 0.8rem;
            margin-top: 2px; flex-shrink: 0;
        }
        .header-address span {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.5;
        }

        .badge-strip { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge-pill { font-size: 0.65rem; font-weight: 700; padding: 4px 12px; border-radius: 20px; }
        .badge-pill.gold { background: rgba(255,180,0,0.1); color: #ffb400; border: 1px solid rgba(255,180,0,0.22); }
        .badge-pill.blue { background: rgba(33,150,243,0.1); color: #64b5f6; border: 1px solid rgba(33,150,243,0.2); }

        /* ── DIVIDER ── */
        .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 0 24px; }

        /* ── CONTACT ROWS — no labels, compact ── */
        .contact-section { padding: 0 24px; }

        .contact-row {
            display: flex; align-items: center; gap: 14px;
            padding: 11px 0;   /* tighter than before */
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .contact-row:last-child { border-bottom: none; }
        .contact-row:hover { opacity: 0.8; }
        .contact-row:hover .ci { background: #ff8c42; border-color: #ff8c42; }
        .contact-row:hover .ci i { color: #fff; }

        .ci {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,140,66,0.1);
            border: 1px solid rgba(255,140,66,0.22);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s;
        }
        .ci i { font-size: 0.95rem; color: #ff8c42; transition: color 0.2s; }

        /* Value only — no label */
        .c-value {
            flex: 1;
            font-size: 0.92rem; color: rgba(255,255,255,0.88);
            font-weight: 600;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .c-arrow { color: rgba(255,255,255,0.16); font-size: 0.7rem; flex-shrink: 0; }

        /* Phone + WhatsApp combined */
        .phone-wa-row {
            display: flex; align-items: center; gap: 14px;
            padding: 11px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .ci-phone {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,140,66,0.1);
            border: 1px solid rgba(255,140,66,0.22);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .ci-phone i { font-size: 0.95rem; color: #ff8c42; }
        .phone-wa-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .phone-num {
            font-size: 0.92rem; color: rgba(255,255,255,0.88);
            font-weight: 600; text-decoration: none;
        }
        .phone-num:hover { color: #ff8c42; }
        .wa-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(37,211,102,0.12);
            border: 1px solid rgba(37,211,102,0.28);
            color: #25d366;
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.68rem; font-weight: 700;
            text-decoration: none; transition: background 0.2s;
        }
        .wa-chip:hover { background: rgba(37,211,102,0.22); }
        .wa-chip i { font-size: 0.75rem; }

        /* ── SECTION BLOCK ── */
        .sec { padding: 20px 24px 0; }
        .sec-heading {
            font-size: 0.6rem; font-weight: 700;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: rgba(255,255,255,0.28);
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px;
        }
        .sec-heading::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }

        /* ── SOCIAL ── */
        .social-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .social-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 9px 16px; border-radius: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            text-decoration: none; transition: all 0.2s;
            font-size: 0.78rem; font-weight: 600;
            color: rgba(255,255,255,0.72);
        }
        .social-btn i { font-size: 0.95rem; }
        .social-btn:hover { background: rgba(255,140,66,0.1); border-color: rgba(255,140,66,0.3); color: #ff8c42; }

        /* ── PRODUCTS — full width each, stacked ── */
        .products-list { display: flex; flex-direction: column; gap: 12px; }
        .product-item {
            background: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
        }
        .product-item img {
            width: 100%;
            height: auto;
            display: block;
            background: #1e1e1e;
        }
        .product-item-name {
            font-size: 0.82rem;
            padding: 10px 14px 12px;
            color: rgba(255,255,255,0.75);
            font-weight: 600;
            line-height: 1.35;
        }

        /* ── PDF ── */
        .pdf-list { display: flex; flex-direction: column; gap: 10px; }
        .pdf-item {
            display: flex; align-items: center; gap: 14px;
            padding: 13px 15px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; text-decoration: none; transition: all 0.2s;
        }
        .pdf-item:hover { background: rgba(255,140,66,0.08); border-color: rgba(255,140,66,0.28); }
        .pdf-icon {
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(255,140,66,0.12);
            display: flex; align-items: center; justify-content: center;
            color: #ff8c42; font-size: 1rem; flex-shrink: 0;
        }
        .pdf-name { flex: 1; font-size: 0.82rem; font-weight: 600; color: rgba(255,255,255,0.82); }
        .pdf-arrow { color: rgba(255,255,255,0.22); font-size: 0.75rem; }

        /* ── CUSTOM ── */
        .custom-item {
            display: flex; align-items: center; gap: 14px;
            padding: 13px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .custom-item:last-child { border-bottom: none; }
        .custom-icon-box {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .c-ttl { font-size: 0.6rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
        .c-val { font-size: 0.85rem; color: rgba(255,255,255,0.82); font-weight: 500; word-break: break-all; }
        a.c-val { color: #ff8c42; text-decoration: none; }

        /* ── QR ── */
        .qr-box {
            text-align: center; padding: 22px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px;
        }
        .qr-label { font-size: 0.62rem; color: rgba(255,255,255,0.28); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
        #qrcode { display: flex; justify-content: center; }
        #qrcode canvas, #qrcode img { border-radius: 8px; }

        /* ── BUTTONS ── */
        .action-buttons { display: flex; gap: 12px; padding: 20px 24px 30px; }
        .btn {
            flex: 1; padding: 15px 8px; border-radius: 40px;
            font-weight: 700; font-size: 0.85rem;
            cursor: pointer; border: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff8c42, #ff6020);
            color: #fff; box-shadow: 0 4px 16px rgba(255,140,66,0.38);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255,140,66,0.5); }
        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,140,66,0.45);
            color: #ff8c42;
        }
        .btn-outline:hover { background: rgba(255,140,66,0.1); transform: translateY(-2px); }

        /* ── FOOTER ── */
        .footer {
            text-align: center; font-size: 0.58rem;
            color: rgba(255,255,255,0.18);
            padding: 14px 24px 28px;
            border-top: 1px solid rgba(255,255,255,0.06);
            line-height: 1.8;
        }
        .admin-link { color: rgba(255,255,255,0.18); text-decoration: none; }
        .admin-link:hover { color: #ff8c42; }
    </style>
</head>
<body>
<div class="card" id="card"></div>

<script>
    let cardData = {};

    async function loadData() {
        try {
            const r = await fetch('data/config.json?v=' + Date.now());
            if (r.ok) cardData = await r.json();
        } catch(e) { console.error(e); }
        renderCard();
    }

    function esc(s) {
        if (!s) return '';
        return String(s).replace(/[&<>"']/g, m =>
            ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }
    function fmtWeb(u) { return (u||'').replace(/^https?:\/\//,'').replace(/\/$/,''); }

    function renderCard() {
        const d = cardData;
        const wechatQrSrc = d.wechatQr || 'images/wechat-qr.jpg';
        const wechatId = d.wechat || 'empparts';

        /* Cover */
        const coverHtml = d.coverImage
            ? `<img class="cover-image" src="${esc(d.coverImage)}" onerror="this.style.display='none'">`
            : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a3a4a,#0a1e2e)"></div>`;

        /* Avatar */
        const avatarHtml = `<div class="avatar-wrapper">
            ${d.avatar
                ? `<img src="${esc(d.avatar)}" alt="avatar" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
                   <div class="av-ph" style="display:none">👤</div>`
                : `<div class="av-ph">👤</div>`}
        </div>`;

        /* Badges */
        const badgesHtml = (d.badgeText||d.badgeSubText) ? `<div class="badge-strip" style="margin-top:12px;">
            ${d.badgeText    ? `<span class="badge-pill gold">🏆 ${esc(d.badgeText)}</span>` : ''}
            ${d.badgeSubText ? `<span class="badge-pill blue">${esc(d.badgeSubText)}</span>` : ''}
        </div>` : '';



        /* Company name row above phone */
        const companyRowHtml = d.companyName ? `
        <div class="phone-wa-row" style="border-bottom:1px solid rgba(255,255,255,0.06);">
            <div class="ci-phone"><i class="fas fa-building"></i></div>
            <div class="phone-wa-info">
                <span class="phone-num" style="font-size:1rem;color:rgba(255,255,255,0.95);">${esc(d.companyName)}</span>
            </div>
        </div>` : '';


        const wechatRowHtml = `
        <div class="contact-row" style="cursor:default;">
            <div class="ci" style="background:rgba(7,193,96,0.1);border-color:rgba(7,193,96,0.25);">
                <i class="fab fa-weixin" style="color:#07C160;"></i>
            </div>
            <div class="c-value" style="color:rgba(255,255,255,0.88);">${esc(wechatId)}</div>
        </div>`;

        /* Phone + WhatsApp row */
        const phoneWaHtml = (d.phone || d.whatsapp) ? `
        <div class="phone-wa-row">
            <div class="ci-phone"><i class="fas fa-phone-alt"></i></div>
            <div class="phone-wa-info">
                ${d.phone    ? `<a href="tel:${esc(d.phone)}" class="phone-num">${esc(d.phone)}</a>` : ''}
                ${d.whatsapp ? `<a href="https://wa.me/${d.whatsapp.replace(/\D/g,'')}" target="_blank" class="wa-chip"><i class="fab fa-whatsapp"></i>WhatsApp</a>` : ''}
            </div>
        </div>` : '';

        /* Email + Website + Address rows — value only, no label */
        const addrRowHtml = d.address ? `
            <div class="contact-row" style="cursor:default;">
                <div class="ci"><i class="fas fa-map-marker-alt"></i></div>
                <div class="c-value" style="white-space:normal;font-size:0.85rem;font-weight:500;color:rgba(255,255,255,0.65);">${esc(d.address)}</div>
            </div>` : '';

        const otherContacts = [
            d.email   && {href:`mailto:${d.email}`, icon:'fas fa-envelope', val:d.email,           ext:false},
            d.website && {href:d.website,            icon:'fas fa-globe',   val:fmtWeb(d.website), ext:true},
        ].filter(Boolean).map(c=>`
            <a href="${esc(c.href)}" class="contact-row" ${c.ext?'target="_blank"':''}>
                <div class="ci"><i class="${c.icon}"></i></div>
                <div class="c-value">${esc(c.val)}</div>
                <i class="fas fa-chevron-right c-arrow"></i>
            </a>`).join('') + addrRowHtml;

        /* Social */
        const socList = [
            d.instagram && {href:d.instagram, icon:'fab fa-instagram', label:'Instagram', clr:'#E1306C'},
            d.facebook  && {href:d.facebook,  icon:'fab fa-facebook',  label:'Facebook',  clr:'#1877F2'},
            d.youtube   && {href:d.youtube,   icon:'fab fa-youtube',   label:'YouTube',   clr:'#FF0000'},
            d.linkedin  && {href:d.linkedin,  icon:'fab fa-linkedin',  label:'LinkedIn',  clr:'#0A66C2'},
            d.tiktok    && {href:d.tiktok,    icon:'fab fa-tiktok',    label:'TikTok',    clr:'#fff'},
            d.twitter   && {href:d.twitter,   icon:'fab fa-twitter',   label:'Twitter',   clr:'#1DA1F2'},
        ].filter(Boolean);

        const socialHtml = socList.length ? `<div class="sec">
            <div class="sec-heading">Social Media</div>
            <div class="social-grid">
                ${socList.map(s=>`<a href="${esc(s.href)}" target="_blank" class="social-btn">
                    <i class="${s.icon}" style="color:${s.clr}"></i>${s.label}
                </a>`).join('')}
            </div></div>` : '';

        /* Products — full width stacked */
        const vp = (d.products||[]).filter(p=>p&&p.img);
        const productsHtml = vp.length ? `<div class="sec">
            <div class="sec-heading">Products &amp; Brands</div>
            <div class="products-list">
                ${vp.map(p=>`<div class="product-item">
                    <img src="${esc(p.img)}" alt="${esc(p.name)}" onerror="this.style.background='#2a2a2a'">
                    <div class="product-item-name">${esc(p.name)}</div>
                </div>`).join('')}
            </div></div>` : '';

        /* PDFs */
        const pdfHtml = (d.pdfFiles||[]).length ? `<div class="sec">
            <div class="sec-heading">Company Brochures</div>
            <div class="pdf-list">
                ${d.pdfFiles.map(f=>`<a href="${esc(f.url)}" target="_blank" class="pdf-item">
                    <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="pdf-name">${esc(f.name)}</div>
                    <i class="fas fa-external-link-alt pdf-arrow"></i>
                </a>`).join('')}
            </div></div>` : '';

        /* Custom */
        const customHtml = (d.customItems||[]).length ? `<div class="sec">
            <div class="sec-heading">More Info</div>
            <div>${d.customItems.map(item=>`
                <div class="custom-item">
                    <div class="custom-icon-box">${item.icon||'📌'}</div>
                    <div style="flex:1;min-width:0;">
                        <div class="c-ttl">${esc(item.title)}</div>
                        ${item.link
                            ? `<a href="${esc(item.link)}" target="_blank" class="c-val">${esc(item.value)}&nbsp;<i class="fas fa-external-link-alt" style="font-size:.58rem;"></i></a>`
                            : `<div class="c-val">${esc(item.value)}</div>`}
                    </div>
                </div>`).join('')}
            </div></div>` : '';

        /* Assemble */
        document.getElementById('card').innerHTML = `
            <div class="cover-area">
                ${coverHtml}
                <div class="cover-overlay"></div>
            </div>

            <div class="header-area">
                ${avatarHtml}
                <div class="person-name">${esc(d.name||'')}</div>
                ${d.title   ? `<div class="person-title">${esc(d.title)}</div>` : ''}
                ${d.tagline ? `<div class="tagline-text">${esc(d.tagline)}</div>` : ''}
                ${badgesHtml}
            </div>

            <div class="divider"></div>

            <div class="contact-section">
                ${companyRowHtml}
                ${phoneWaHtml}
                ${otherContacts}
                ${wechatRowHtml}
            </div>

            ${socialHtml}
            ${productsHtml}
            ${pdfHtml}
            ${customHtml}

            <div class="sec" style="margin-bottom:22px;">
                <div class="sec-heading">Scan to Connect</div>
                <div style="display:flex;gap:12px;">
                    <div class="qr-box" style="flex:1;">
                        <div class="qr-label">📱 Digital Card</div>
                        <div id="qrcode"></div>
                    </div>
                    <div class="qr-box" style="flex:1;">
                        <div class="qr-label" style="color:#07C160;">
                            <i class="fab fa-weixin" style="font-size:0.9rem;margin-right:4px;"></i>WeChat
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
                            <img src="${wechatQrSrc}" 
                                 style="width:148px;height:148px;border-radius:8px;object-fit:contain;background:#fff;"
                                 onerror="this.style.display='none';this.nextSibling.style.display='flex'">
                            <div style="display:none;width:148px;height:148px;border-radius:8px;background:rgba(7,193,96,0.08);border:1px dashed rgba(7,193,96,0.3);align-items:center;justify-content:center;flex-direction:column;gap:6px;">
                                <i class="fab fa-weixin" style="font-size:2rem;color:#07C160;"></i>
                                <span style="font-size:0.62rem;color:rgba(255,255,255,0.4);">Upload QR in Admin</span>
                            </div>
                            <div style="font-size:0.72rem;color:#07C160;font-weight:700;">
                                <i class="fab fa-weixin"></i> empparts
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="saveContactBtn">
                    <i class="fas fa-user-plus"></i> Save Contact
                </button>
                <button class="btn btn-outline" id="shareCardBtn">
                    <i class="fas fa-share-alt"></i> Share Card
                </button>
            </div>

            <div class="footer">
                EMP PARTS CO., LTD. &nbsp;·&nbsp; Trusted Partner Since 2002<br>
                <a href="admin.html" class="admin-link">🔐 Admin</a>
            </div>`;

        /* QR */
        const qrDiv = document.getElementById('qrcode');
        if (qrDiv) {
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, {
                text: window.location.href,
                width: 148, height: 148,
                colorDark: '#ffffff', colorLight: '#141414'
            });
        }

        document.getElementById('saveContactBtn')?.addEventListener('click', saveContact);
        document.getElementById('shareCardBtn')?.addEventListener('click', shareCard);
    }

    /* vCard */
    function saveContact() {
        const d = cardData;
        const ln = (d.name||'').split(' ');
        const lines = [
            'BEGIN:VCARD','VERSION:3.0',
            `FN:${d.name||''}`,
            `N:${ln.slice(1).join(' ')};${ln[0]};;;`,
            `ORG:${d.companyName||''}`,
            `TITLE:${d.title||''}`,
        ];
        if (d.phone)    lines.push(`TEL;TYPE=WORK,VOICE:${d.phone}`);
        if (d.whatsapp) lines.push(`TEL;TYPE=CELL:+${d.whatsapp.replace(/\D/g,'')}`);
        if (d.email)    lines.push(`EMAIL;TYPE=WORK:${d.email}`);
        if (d.website)  lines.push(`URL:${d.website}`);
        if (d.address)  lines.push(`ADR;TYPE=WORK:;;${(d.address||'').replace(/\n/g,', ')};;;;`);
        if (d.instagram) lines.push(`X-SOCIALPROFILE;type=instagram:${d.instagram}`);
        if (d.linkedin)  lines.push(`X-SOCIALPROFILE;type=linkedin:${d.linkedin}`);
        if (d.tagline)   lines.push(`NOTE:${d.tagline}`);
        lines.push('END:VCARD');
        const blob = new Blob([lines.join('\r\n')], {type:'text/vcard;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const a = Object.assign(document.createElement('a'),
            {href:url, download:`${(d.name||'contact').replace(/\s+/g,'_')}.vcf`});
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    /* Share */
    function shareCard() {
        const d = cardData;
        if (navigator.share) {
            navigator.share({title:(d.name||'')+' - Business Card', url:window.location.href});
        } else {
            navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied!'));
        }
    }

    loadData();
</script>
</body>
</html>
