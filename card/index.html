<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EMP PARTS - Digital Business Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: #0d0d0d;
            min-height: 100vh;
        }

        /* ── COVER ── */
        .cover-area {
            position: relative;
            width: 100%; height: 220px;
            overflow: hidden;
            background: #1a1a1a;
        }
        .cover-image { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cover-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.6) 100%);
        }

        /* ── AVATAR ── */
        .avatar-wrapper {
            position: absolute;
            bottom: -50px; left: 24px;
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid #ff8c42;
            overflow: hidden;
            background: #222;
            box-shadow: 0 4px 20px rgba(255,140,66,0.4);
            z-index: 10;
        }
        .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-placeholder {
            width: 100%; height: 100%;
            background: #ff8c42;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: white;
        }

        /* ── HEADER ── */
        .header-info { padding: 62px 24px 20px; background: #0d0d0d; }
        .company-badge {
            display: inline-block;
            background: rgba(255,140,66,0.12);
            border: 1px solid rgba(255,140,66,0.35);
            color: #ff8c42;
            font-size: 0.6rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 4px 12px; border-radius: 20px;
            margin-bottom: 10px;
        }
        .person-name { font-size: 2rem; font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 4px; }
        .person-title { font-size: 0.82rem; color: #ff8c42; font-weight: 600; margin-bottom: 6px; }
        .tagline-text { font-size: 0.72rem; color: rgba(255,255,255,0.4); line-height: 1.5; margin-bottom: 14px; }
        .badge-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .badge-pill { font-size: 0.6rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: 0.5px; }
        .badge-pill.gold { background: rgba(255,180,0,0.12); color: #ffb400; border: 1px solid rgba(255,180,0,0.25); }
        .badge-pill.blue { background: rgba(33,150,243,0.1); color: #64b5f6; border: 1px solid rgba(33,150,243,0.2); }

        /* ── DIVIDER ── */
        .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 24px 0; }

        /* ── CONTACTS ── */
        .contact-section { padding: 0 24px; }
        .contact-row {
            display: flex; align-items: center; gap: 16px;
            padding: 13px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            text-decoration: none; cursor: pointer; transition: all 0.2s;
        }
        .contact-row:last-child { border-bottom: none; }
        .contact-row:hover .ci { background: #ff8c42; border-color: #ff8c42; }
        .contact-row:hover .ci i { color: white; }
        .ci {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255,140,66,0.1);
            border: 1px solid rgba(255,140,66,0.22);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s;
        }
        .ci i { font-size: 1rem; color: #ff8c42; transition: color 0.2s; }
        .c-info { flex: 1; min-width: 0; }
        .c-label { font-size: 0.58rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .c-value { font-size: 0.88rem; color: rgba(255,255,255,0.9); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .c-arrow { color: rgba(255,255,255,0.18); font-size: 0.72rem; }

        /* ── SECTION BLOCK ── */
        .section-block { padding: 20px 24px 0; }
        .section-heading {
            font-size: 0.62rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: rgba(255,255,255,0.28);
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 10px;
        }
        .section-heading::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

        /* ── SOCIAL ── */
        .social-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .social-btn {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 14px; border-radius: 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            text-decoration: none; transition: all 0.2s;
            font-size: 0.73rem; font-weight: 600;
            color: rgba(255,255,255,0.7);
        }
        .social-btn i { font-size: 0.95rem; }
        .social-btn:hover { background: rgba(255,140,66,0.12); border-color: rgba(255,140,66,0.35); color: #ff8c42; }

        /* ── PRODUCTS ── */
        .products-scroll {
            display: flex; overflow-x: auto; gap: 12px;
            scroll-snap-type: x mandatory; padding-bottom: 6px;
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .products-scroll::-webkit-scrollbar { display: none; }
        .product-card {
            flex: 0 0 140px; scroll-snap-align: start;
            background: #1a1a1a; border-radius: 14px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
        }
        .product-img { width: 100%; height: 100px; object-fit: cover; display: block; background: #222; }
        .product-name { font-size: 0.62rem; padding: 8px 10px; color: rgba(255,255,255,0.65); font-weight: 500; line-height: 1.3; }

        /* ── PDF ── */
        .pdf-list { display: flex; flex-direction: column; gap: 8px; }
        .pdf-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; text-decoration: none; transition: all 0.2s;
        }
        .pdf-item:hover { background: rgba(255,140,66,0.09); border-color: rgba(255,140,66,0.28); }
        .pdf-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(255,140,66,0.12);
            display: flex; align-items: center; justify-content: center;
            color: #ff8c42; font-size: 1rem; flex-shrink: 0;
        }
        .pdf-name { flex: 1; font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.82); }
        .pdf-arrow { color: rgba(255,255,255,0.22); font-size: 0.72rem; }

        /* ── CUSTOM ── */
        .custom-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .custom-item:last-child { border-bottom: none; }
        .custom-icon-wrap {
            width: 38px; height: 38px; border-radius: 10px;
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .custom-ttl { font-size: 0.62rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .custom-val { font-size: 0.82rem; color: rgba(255,255,255,0.82); font-weight: 500; word-break: break-all; }
        .custom-link { color: #ff8c42; text-decoration: none; }

        /* ── ADDRESS ── */
        .address-block {
            display: flex; gap: 12px; align-items: flex-start;
            padding: 12px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
        }
        .address-icon { color: #ff8c42; font-size: 0.95rem; margin-top: 2px; flex-shrink: 0; }
        .address-text { font-size: 0.77rem; color: rgba(255,255,255,0.55); line-height: 1.6; }

        /* ── QR ── */
        .qr-section {
            text-align: center; padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.07);
        }
        .qr-label { font-size: 0.65rem; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
        #qrcode { display: flex; justify-content: center; }
        #qrcode canvas, #qrcode img { border-radius: 8px; }

        /* ── BUTTONS ── */
        .action-buttons { display: flex; gap: 10px; padding: 20px 24px 28px; }
        .btn {
            flex: 1; padding: 14px 8px; border-radius: 40px;
            font-weight: 700; font-size: 0.78rem;
            text-align: center; cursor: pointer; border: none;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 7px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff8c42, #ff6b2b);
            color: white; box-shadow: 0 4px 18px rgba(255,140,66,0.38);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 22px rgba(255,140,66,0.5); }
        .btn-outline {
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,140,66,0.45);
            color: #ff8c42;
        }
        .btn-outline:hover { background: rgba(255,140,66,0.1); transform: translateY(-2px); }

        /* ── FOOTER ── */
        .footer {
            text-align: center; font-size: 0.55rem;
            color: rgba(255,255,255,0.18);
            padding: 14px 24px 28px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .admin-link { color: rgba(255,255,255,0.18); text-decoration: none; }
        .admin-link:hover { color: #ff8c42; }

        @media (max-width: 480px) {
            .person-name { font-size: 1.7rem; }
            .cover-area { height: 190px; }
            .avatar-wrapper { width: 88px; height: 88px; bottom: -44px; }
            .header-info { padding-top: 56px; }
        }
    </style>
</head>
<body>
<div class="card" id="card"></div>

<script>
    let cardData = {};

    async function loadData() {
        try {
            const r = await fetch('data/config.json?v=' + Date.now());
            if (r.ok) cardData = await r.json();
        } catch(e) { console.error(e); }
        renderCard();
    }

    function esc(s) {
        if (!s) return '';
        return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
    }
    function fmtWeb(url) { return (url||'').replace(/^https?:\/\//,'').replace(/\/$/,''); }

    function renderCard() {
        const d = cardData;

        // Cover
        const coverHtml = d.coverImage
            ? `<img class="cover-image" src="${esc(d.coverImage)}" onerror="this.style.display='none'">`
            : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a3a4a,#0d2a38)"></div>`;

        // Avatar
        const avatarInner = d.avatar
            ? `<img src="${esc(d.avatar)}" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>👤</div>'">`
            : `<div class="avatar-placeholder">👤</div>`;

        // Badges
        const badgesHtml = (d.badgeText||d.badgeSubText) ? `<div class="badge-strip">
            ${d.badgeText    ? `<span class="badge-pill gold">🏆 ${esc(d.badgeText)}</span>` : ''}
            ${d.badgeSubText ? `<span class="badge-pill blue">${esc(d.badgeSubText)}</span>` : ''}
        </div>` : '';

        // Contacts
        const contactsHtml = [
            d.phone    ? {href:`tel:${d.phone}`, icon:'fas fa-phone-alt', label:'Phone', value:d.phone} : null,
            d.whatsapp ? {href:`https://wa.me/${d.whatsapp.replace(/[^0-9]/g,'')}`, icon:'fab fa-whatsapp', label:'WhatsApp', value:d.whatsapp, ext:true} : null,
            d.email    ? {href:`mailto:${d.email}`, icon:'fas fa-envelope', label:'Email', value:d.email} : null,
            d.website  ? {href:d.website, icon:'fas fa-globe', label:'Website', value:fmtWeb(d.website), ext:true} : null,
        ].filter(Boolean).map(c=>`
            <a href="${esc(c.href)}" class="contact-row" ${c.ext?'target="_blank"':''}>
                <div class="ci"><i class="${c.icon}"></i></div>
                <div class="c-info">
                    <div class="c-label">${c.label}</div>
                    <div class="c-value">${esc(c.value)}</div>
                </div>
                <i class="fas fa-chevron-right c-arrow"></i>
            </a>`).join('');

        // Social
        const socialItems = [
            d.instagram ? {href:d.instagram, icon:'fab fa-instagram', label:'Instagram', color:'#E1306C'} : null,
            d.facebook  ? {href:d.facebook,  icon:'fab fa-facebook',  label:'Facebook',  color:'#1877F2'} : null,
            d.youtube   ? {href:d.youtube,   icon:'fab fa-youtube',   label:'YouTube',   color:'#FF0000'} : null,
            d.linkedin  ? {href:d.linkedin,  icon:'fab fa-linkedin',  label:'LinkedIn',  color:'#0A66C2'} : null,
            d.tiktok    ? {href:d.tiktok,    icon:'fab fa-tiktok',    label:'TikTok',    color:'#fff'}    : null,
            d.twitter   ? {href:d.twitter,   icon:'fab fa-twitter',   label:'Twitter',   color:'#1DA1F2'} : null,
        ].filter(Boolean);
        const socialHtml = socialItems.length ? `<div class="section-block">
            <div class="section-heading">Social Media</div>
            <div class="social-grid">
                ${socialItems.map(s=>`<a href="${esc(s.href)}" target="_blank" class="social-btn"><i class="${s.icon}" style="color:${s.color}"></i>${s.label}</a>`).join('')}
            </div></div>` : '';

        // Products
        const vp = (d.products||[]).filter(p=>p&&p.img);
        const productsHtml = vp.length ? `<div class="section-block">
            <div class="section-heading">Products & Brands</div>
            <div class="products-scroll">
                ${vp.map(p=>`<div class="product-card"><img class="product-img" src="${esc(p.img)}" alt="${esc(p.name)}" onerror="this.style.display='none'"><div class="product-name">${esc(p.name)}</div></div>`).join('')}
            </div></div>` : '';

        // PDFs
        const pdfHtml = (d.pdfFiles||[]).length ? `<div class="section-block">
            <div class="section-heading">Company Brochures</div>
            <div class="pdf-list">
                ${d.pdfFiles.map(f=>`<a href="${esc(f.url)}" target="_blank" class="pdf-item">
                    <div class="pdf-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="pdf-name">${esc(f.name)}</div>
                    <i class="fas fa-external-link-alt pdf-arrow"></i>
                </a>`).join('')}
            </div></div>` : '';

        // Custom
        const customHtml = (d.customItems||[]).length ? `<div class="section-block">
            <div class="section-heading">More Info</div>
            <div>${d.customItems.map(item=>`
                <div class="custom-item">
                    <div class="custom-icon-wrap">${item.icon||'📌'}</div>
                    <div style="flex:1;min-width:0;">
                        <div class="custom-ttl">${esc(item.title)}</div>
                        ${item.link
                            ? `<a href="${esc(item.link)}" target="_blank" class="custom-link custom-val">${esc(item.value)} <i class="fas fa-external-link-alt" style="font-size:0.58rem;"></i></a>`
                            : `<div class="custom-val">${esc(item.value)}</div>`}
                    </div>
                </div>`).join('')}
            </div></div>` : '';

        // Address
        const addressHtml = d.address ? `<div class="section-block">
            <div class="section-heading">Address</div>
            <div class="address-block">
                <i class="fas fa-map-marker-alt address-icon"></i>
                <div class="address-text">${esc(d.address)}</div>
            </div></div>` : '';

        document.getElementById('card').innerHTML = `
            <div class="cover-area">
                ${coverHtml}
                <div class="cover-overlay"></div>
                <div class="avatar-wrapper">${avatarInner}</div>
            </div>
            <div class="header-info">
                ${d.companyName ? `<div class="company-badge">${esc(d.companyName)}</div>` : ''}
                <div class="person-name">${esc(d.name)}</div>
                ${d.title   ? `<div class="person-title">${esc(d.title)}</div>` : ''}
                ${d.tagline ? `<div class="tagline-text">${esc(d.tagline)}</div>` : ''}
                ${badgesHtml}
            </div>
            <div class="divider"></div>
            <div class="contact-section">${contactsHtml}</div>
            ${socialHtml}
            ${productsHtml}
            ${pdfHtml}
            ${customHtml}
            ${addressHtml}
            <div class="section-block" style="margin-bottom:20px;">
                <div class="section-heading">Scan to Share</div>
                <div class="qr-section">
                    <div class="qr-label">Scan QR Code to open this card</div>
                    <div id="qrcode"></div>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" id="saveContactBtn"><i class="fas fa-user-plus"></i> Save Contact</button>
                <button class="btn btn-outline"  id="shareCardBtn"><i class="fas fa-share-alt"></i> Share Card</button>
            </div>
            <div class="footer">
                EMP PARTS CO., LTD. · Trusted Partner Since 2002<br>
                <a href="admin.html" class="admin-link">🔐 Admin</a>
            </div>`;

        // QR
        const qrDiv = document.getElementById('qrcode');
        if (qrDiv) {
            qrDiv.innerHTML = '';
            new QRCode(qrDiv, { text: window.location.href, width: 140, height: 140, colorDark:'#ffffff', colorLight:'#0d0d0d' });
        }

        document.getElementById('saveContactBtn')?.addEventListener('click', saveContact);
        document.getElementById('shareCardBtn')?.addEventListener('click', shareCard);
    }

    function saveContact() {
        const d = cardData;
        const lines = ['BEGIN:VCARD','VERSION:3.0',
            `FN:${d.name||''}`,
            `N:${(d.name||'').split(' ').slice(1).join(' ')};${(d.name||'').split(' ')[0]};;;`,
            `ORG:${d.companyName||''}`,`TITLE:${d.title||''}`];
        if (d.phone)    lines.push(`TEL;TYPE=WORK,VOICE:${d.phone}`);
        if (d.whatsapp) lines.push(`TEL;TYPE=CELL:+${d.whatsapp.replace(/[^0-9]/g,'')}`);
        if (d.email)    lines.push(`EMAIL;TYPE=WORK:${d.email}`);
        if (d.website)  lines.push(`URL:${d.website}`);
        if (d.address)  lines.push(`ADR;TYPE=WORK:;;${d.address.replace(/\n/g,', ')};;;;`);
        if (d.instagram) lines.push(`X-SOCIALPROFILE;type=instagram:${d.instagram}`);
        if (d.linkedin)  lines.push(`X-SOCIALPROFILE;type=linkedin:${d.linkedin}`);
        if (d.tagline)   lines.push(`NOTE:${d.tagline}`);
        lines.push('END:VCARD');
        const blob = new Blob([lines.join('\r\n')],{type:'text/vcard;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href=url; a.download=`${(d.name||'contact').replace(/\s+/g,'_')}.vcf`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(url),1000);
    }

    function shareCard() {
        const d = cardData;
        if (navigator.share) {
            navigator.share({title:(d.name||'')+' - Business Card', url:window.location.href});
        } else {
            navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied!'));
        }
    }

    loadData();
</script>
</body>
</html>
