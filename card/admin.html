<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Business Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a2a3a; font-family: system-ui; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; padding: 30px; }
        h2 { color: #ff8c42; margin: 20px 0 10px; border-left: 3px solid #ff8c42; padding-left: 12px; }
        input, textarea { width: 100%; padding: 8px; margin: 4px 0 12px; border: 1px solid #ccc; border-radius: 12px; }
        .item-row { background: #f5f5f5; padding: 16px; border-radius: 20px; margin-bottom: 16px; }
        button { background: #ff8c42; color: white; border: none; padding: 8px 18px; border-radius: 30px; cursor: pointer; margin: 8px 4px; }
        .btn-small { background: #2c4b5e; }
        .btn-danger { background: #c00; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="adminPwd" placeholder="Password">
    <button onclick="login()">Login</button>

    <div id="adminPanel" style="display:none; margin-top: 20px;">
        <h2>🏢 Basic Info</h2>
        <label>Cover Image URL</label><input type="text" id="coverImage">
        <label>Avatar URL</label><input type="text" id="avatar">
        <label>Company Name</label><input type="text" id="companyName">
        <label>Tagline</label><input type="text" id="tagline">
        <label>Description</label><textarea id="description" rows="2"></textarea>
        <label>Badge Text</label><input type="text" id="badgeText">
        <label>Badge Sub</label><input type="text" id="badgeSubText">

        <h2>👤 Personal</h2>
        <label>Name</label><input type="text" id="name">
        <label>Title</label><input type="text" id="title">

        <h2>📞 Contact</h2>
        <label>Phone</label><input type="text" id="phone">
        <label>WhatsApp</label><input type="text" id="whatsapp">
        <label>Email</label><input type="text" id="email">
        <label>Website</label><input type="text" id="website">

        <h2>📱 Social</h2>
        <label>Instagram</label><input type="text" id="instagram">
        <label>Facebook</label><input type="text" id="facebook">
        <label>YouTube</label><input type="text" id="youtube">
        <label>LinkedIn</label><input type="text" id="linkedin">
        <label>TikTok</label><input type="text" id="tiktok">
        <label>Twitter</label><input type="text" id="twitter">

        <h2>📍 Address</h2>
        <textarea id="address" rows="2"></textarea>

        <h2>📦 Products (image + name)</h2>
        <div id="productsArea"></div>
        <button class="btn-small" onclick="addProduct()">+ Add Product</button>

        <h2>📄 PDF Files</h2>
        <div id="pdfsArea"></div>
        <button class="btn-small" onclick="addPdf()">+ Add PDF</button>

        <h2>✨ Custom Items</h2>
        <div id="customArea"></div>
        <button class="btn-small" onclick="addCustom()">+ Add Custom</button>

        <br><br>
        <button onclick="saveAll()">💾 SAVE ALL</button>
        <div id="msg" style="margin-top: 12px; color: green;"></div>
        <p><a href="index.html" target="_blank">🔗 View Card</a></p>
    </div>
</div>

<script>
    const PWD = "123456";
    let products = [], pdfs = [], customs = [];

    function login() {
        let pwd = document.getElementById('adminPwd').value;
        if (pwd !== PWD) return alert('Wrong password');
        document.getElementById('adminPanel').style.display = 'block';
        loadData();
    }

    function loadData() {
        let raw = localStorage.getItem('nfc_card_data');
        let data = raw ? JSON.parse(raw) : {};
        document.getElementById('coverImage').value = data.coverImage || '';
        document.getElementById('avatar').value = data.avatar || '';
        document.getElementById('companyName').value = data.companyName || 'EMP PARTS';
        document.getElementById('tagline').value = data.tagline || '';
        document.getElementById('description').value = data.description || '';
        document.getElementById('badgeText').value = data.badgeText || '';
        document.getElementById('badgeSubText').value = data.badgeSubText || '';
        document.getElementById('name').value = data.name || '';
        document.getElementById('title').value = data.title || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('whatsapp').value = data.whatsapp || '';
        document.getElementById('email').value = data.email || '';
        document.getElementById('website').value = data.website || '';
        document.getElementById('instagram').value = data.instagram || '';
        document.getElementById('facebook').value = data.facebook || '';
        document.getElementById('youtube').value = data.youtube || '';
        document.getElementById('linkedin').value = data.linkedin || '';
        document.getElementById('tiktok').value = data.tiktok || '';
        document.getElementById('twitter').value = data.twitter || '';
        document.getElementById('address').value = data.address || '';
        products = data.products || [];
        pdfs = data.pdfFiles || [];
        customs = data.customItems || [];
        renderProducts();
        renderPdfs();
        renderCustom();
    }

    function renderProducts() {
        let html = '';
        products.forEach((p, i) => {
            html += `<div class="item-row">
                <label>Product Name</label><input id="p_name_${i}" value="${escapeHtml(p.name)}">
                <label>Image URL</label><input id="p_img_${i}" value="${escapeHtml(p.img)}">
                <button class="btn-danger" onclick="removeProduct(${i})">Remove</button>
            </div>`;
        });
        document.getElementById('productsArea').innerHTML = html;
    }
    function addProduct() { products.push({ name: '', img: '' }); renderProducts(); }
    function removeProduct(i) { products.splice(i,1); renderProducts(); }

    function renderPdfs() {
        let html = '';
        pdfs.forEach((p, i) => {
            html += `<div class="item-row">
                <label>PDF Name</label><input id="pdf_name_${i}" value="${escapeHtml(p.name)}">
                <label>PDF URL</label><input id="pdf_url_${i}" value="${escapeHtml(p.url)}">
                <button class="btn-danger" onclick="removePdf(${i})">Remove</button>
            </div>`;
        });
        document.getElementById('pdfsArea').innerHTML = html;
    }
    function addPdf() { pdfs.push({ name: '', url: '' }); renderPdfs(); }
    function removePdf(i) { pdfs.splice(i,1); renderPdfs(); }

    function renderCustom() {
        let html = '';
        customs.forEach((c, i) => {
            html += `<div class="item-row">
                <label>Icon (emoji)</label><input id="c_icon_${i}" value="${escapeHtml(c.icon || '📌')}">
                <label>Title</label><input id="c_title_${i}" value="${escapeHtml(c.title)}">
                <label>Value</label><input id="c_value_${i}" value="${escapeHtml(c.value)}">
                <label>Link (optional)</label><input id="c_link_${i}" value="${escapeHtml(c.link || '')}">
                <button class="btn-danger" onclick="removeCustom(${i})">Remove</button>
            </div>`;
        });
        document.getElementById('customArea').innerHTML = html;
    }
    function addCustom() { customs.push({ icon: '📌', title: '', value: '', link: '' }); renderCustom(); }
    function removeCustom(i) { customs.splice(i,1); renderCustom(); }

    function saveAll() {
        for (let i = 0; i < products.length; i++) {
            products[i].name = document.getElementById(`p_name_${i}`)?.value || '';
            products[i].img = document.getElementById(`p_img_${i}`)?.value || '';
        }
        for (let i = 0; i < pdfs.length; i++) {
            pdfs[i].name = document.getElementById(`pdf_name_${i}`)?.value || '';
            pdfs[i].url = document.getElementById(`pdf_url_${i}`)?.value || '';
        }
        for (let i = 0; i < customs.length; i++) {
            customs[i].icon = document.getElementById(`c_icon_${i}`)?.value || '📌';
            customs[i].title = document.getElementById(`c_title_${i}`)?.value || '';
            customs[i].value = document.getElementById(`c_value_${i}`)?.value || '';
            customs[i].link = document.getElementById(`c_link_${i}`)?.value || '';
        }

        let all = {
            coverImage: document.getElementById('coverImage').value,
            avatar: document.getElementById('avatar').value,
            companyName: document.getElementById('companyName').value,
            tagline: document.getElementById('tagline').value,
            description: document.getElementById('description').value,
            badgeText: document.getElementById('badgeText').value,
            badgeSubText: document.getElementById('badgeSubText').value,
            name: document.getElementById('name').value,
            title: document.getElementById('title').value,
            phone: document.getElementById('phone').value,
            whatsapp: document.getElementById('whatsapp').value,
            email: document.getElementById('email').value,
            website: document.getElementById('website').value,
            instagram: document.getElementById('instagram').value,
            facebook: document.getElementById('facebook').value,
            youtube: document.getElementById('youtube').value,
            linkedin: document.getElementById('linkedin').value,
            tiktok: document.getElementById('tiktok').value,
            twitter: document.getElementById('twitter').value,
            address: document.getElementById('address').value,
            products: products,
            pdfFiles: pdfs,
            customItems: customs
        };
        localStorage.setItem('nfc_card_data', JSON.stringify(all));
        document.getElementById('msg').innerText = '✅ Saved!';
        setTimeout(() => document.getElementById('msg').innerText = '', 2000);
    }

    function escapeHtml(str) { return (str||'').replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
</script>
</body>
</html>
